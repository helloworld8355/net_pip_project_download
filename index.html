<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件下载</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #58a6ff;
            font-size: 24px;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .subtitle {
            color: #8b949e;
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }
        
        .file-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .file-icon {
            width: 40px;
            height: 40px;
            background: #238636;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .file-name {
            font-weight: 600;
            color: #fff;
        }
        
        .file-desc {
            font-size: 12px;
            color: #8b949e;
        }
        
        .download-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .download-btn:hover {
            background: #2ea043;
        }
        
        .download-btn:disabled {
            background: #1f6feb;
            opacity: 0.7;
            cursor: wait;
        }
        
        .error-msg {
            color: #f85149;
            font-size: 12px;
            margin-top: 8px;
            display: none;
        }
        
        .github-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #30363d;
        }
        
        .github-link a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 文件下载</h1>
        <p class="subtitle">net_pip_project_download</p>
        
        <!-- client.py -->
        <div class="file-card">
            <div class="file-info">
                <div class="file-icon">🐍</div>
                <div>
                    <div class="file-name">client.py</div>
                    <div class="file-desc">客户端程序</div>
                </div>
            </div>
            <button class="download-btn" onclick="downloadFile('client.py', this)">
                ⬇ 下载
            </button>
        </div>
        <div class="error-msg" id="error-client"></div>
        
        <!-- server.py -->
        <div class="file-card">
            <div class="file-info">
                <div class="file-icon">🖥️</div>
                <div>
                    <div class="file-name">server.py</div>
                    <div class="file-desc">服务端程序</div>
                </div>
            </div>
            <button class="download-btn" onclick="downloadFile('server.py', this)">
                ⬇ 下载
            </button>
        </div>
        <div class="error-msg" id="error-server"></div>
        
        <div class="github-link">
            <a href="https://github.com/helloworld8355/net_pip_project_download" target="_blank">
                🔗 在 GitHub 上查看仓库
            </a>
        </div>
    </div>

    <script>
        // 配置
        const CONFIG = {
            owner: 'helloworld8355',
            repo: 'net_pip_project_download',
            branch: 'main'
        };
        
        // 构建 raw 链接
        function getRawUrl(filename) {
            return `https://raw.githubusercontent.com/${CONFIG.owner}/${CONFIG.repo}/${CONFIG.branch}/${filename}`;
        }
        
        // 下载文件（使用 Blob 方式，绕过跨域限制）
        async function downloadFile(filename, btn) {
            const url = getRawUrl(filename);
            const errorEl = document.getElementById(`error-${filename.replace('.py', '')}`);
            
            // 重置错误
            if (errorEl) errorEl.style.display = 'none';
            
            // 设置加载状态
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = '⏳ 获取中...';
            
            try {
                // 使用 fetch 获取文件内容
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                // 获取文件内容
                const blob = await response.blob();
                
                // 创建临时下载链接
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename; // 设置下载文件名
                
                // 触发下载
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                // 释放资源
                window.URL.revokeObjectURL(blobUrl);
                
                // 成功提示
                btn.textContent = '✓ 已下载';
                btn.style.background = '#1f6feb';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                    btn.disabled = false;
                }, 2000);
                
            } catch (error) {
                console.error('下载失败:', error);
                
                // 显示错误
                if (errorEl) {
                    errorEl.textContent = `下载失败: ${error.message}，请尝试下方 GitHub 链接`;
                    errorEl.style.display = 'block';
                }
                
                // 恢复按钮
                btn.textContent = '❌ 失败';
                btn.style.background = '#f85149';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                    btn.disabled = false;
                }, 3000);
                
                // 备用方案：直接打开链接
                setTimeout(() => {
                    if (confirm('直接下载失败，是否在浏览器中打开文件？')) {
                        window.open(url, '_blank');
                    }
                }, 500);
            }
        }
    </script>
</body>
</html>
