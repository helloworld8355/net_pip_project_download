<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>net_pip_project_download - 文件下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #e94560;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            color: #a0a0a0;
            font-size: 14px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .file-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(233, 69, 96, 0.3);
            transform: translateY(-2px);
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .file-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .file-details h3 {
            color: #fff;
            font-size: 16px;
            font-weight: 500;
        }

        .file-details span {
            color: #888;
            font-size: 12px;
        }

        .download-btn {
            background: linear-gradient(135deg, #e94560, #c73e54);
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.3);
        }

        .github-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .github-link a {
            color: #888;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.3s;
        }

        .github-link a:hover {
            color: #e94560;
        }

        /* 下载动画 */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .downloading {
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 net_pip_project_download</h1>
            <p>点击下方按钮下载项目文件</p>
        </div>

        <div class="file-list">
            <!-- client.py -->
            <div class="file-card">
                <div class="file-info">
                    <div class="file-icon">🐍</div>
                    <div class="file-details">
                        <h3>client.py</h3>
                        <span>Python 客户端程序</span>
                    </div>
                </div>
                <a class="download-btn" 
                   href="https://github.com/helloworld8355/net_pip_project_download/raw/main/client.py"
                   download="client.py"
                   onclick="handleDownload(this, 'client.py')">
                    ⬇ 下载
                </a>
            </div>

            <!-- server.py -->
            <div class="file-card">
                <div class="file-info">
                    <div class="file-icon">🖥️</div>
                    <div class="file-details">
                        <h3>server.py</h3>
                        <span>Python 服务端程序</span>
                    </div>
                </div>
                <a class="download-btn" 
                   href="https://github.com/helloworld8355/net_pip_project_download/raw/main/server.py"
                   download="server.py"
                   onclick="handleDownload(this, 'server.py')">
                    ⬇ 下载
                </a>
            </div>
        </div>

        <div class="github-link">
            <a href="https://github.com/helloworld8355/net_pip_project_download" target="_blank">
                🔗 查看 GitHub 仓库 →
            </a>
        </div>
    </div>

    <script>
        function handleDownload(btn, filename) {
            // 添加下载动画
            btn.classList.add('downloading');
            btn.textContent = '⏳ 下载中...';
            
            // 2秒后恢复
            setTimeout(() => {
                btn.classList.remove('downloading');
                btn.textContent = '✓ 已下载';
                
                setTimeout(() => {
                    btn.textContent = '⬇ 下载';
                }, 2000);
            }, 2000);
        }
    </script>
</body>
</html>
